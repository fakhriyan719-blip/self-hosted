name: Deploy Image
run-name: Deploy Image
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Stop and remove existing container
        run: docker compose down --remove-orphans

      - name: Start container
        run: docker compose up -d
